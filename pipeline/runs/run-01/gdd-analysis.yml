    dependencies: [screen-flow, win-sequence]
    ux:
      discovery: "Chapter complete milestone auto-triggered; always shown at chapter boundary"
      feedback: "Animated Mars panorama + confetti. Chapter number, score, 'Keep Going!' button."
      onboarding: "n/a — milestone celebration"
    notes: |
      Shown when level N is the final level of a chapter. Uses interstitial-screen wrapper
      per lifecycle.md (optional but GDD requires it). 'Keep Going!' → Title Screen.
      Chapter score banked; next chapter begins on next play tap from Title.
      What constitutes a chapter boundary is unspecified — open question.

  - id: level-generation
    name: "Procedural level generation — seeded RNG, difficulty profiles, grid population"
    status: new
    risk: MEDIUM
    complexity: high
    lifecycle_phase: PLAY
    cos_required: [core-interaction, skill-curve]
    ux_zones: {}
    affected_files:
      - <game-root>/level/LevelGenerator.ts
      - <game-root>/level/SolvabilityValidator.ts
    dependencies: [ecs-plugin]
    ux:
      discovery: "n/a — generation is invisible; player sees the resulting board"
      feedback: "n/a"
      onboarding: "Levels 1–10 constrained profile (3 species, no planets, max moves) ensures accessible start"
    notes: |
      Seed formula: levelNumber × 12345. Pure function — no Math.random() (use seeded RNG).
      Steps: seed init → difficulty profile → grid population → planet placement → solvability validation.
      Validation: reject if largestGroupSize<2, clearablePercent<0.40, or 3×3 Rocky island.
      Level 1–10 greedy-solver simulation: must clear 80%+ within move limit.
      Retry: seed += 1, max 10 retries. Fallback: force 3 species, 35 moves, no planets.
      Difficulty profiles: Levels 1–10 / 11–30 / 31+. Breathing room: every 5th level +5 moves.
      CoS skill-curve gated at meta pass; record deferred-to-pass-meta for that CoS.

  - id: scoring-system
    name: "Scoring system — multiplicative dimensions (group size, cascade depth, combo bonus)"
    status: new
    risk: LOW
    complexity: med
    lifecycle_phase: PLAY
    cos_required: [scoring]
    ux_zones:
      thumb_zone: out-of-reach
      touch_targets: []
      feedback_surfaces: [hud-score, score-tally-animation]
    affected_files:
      - <game-root>/state/MarsBouncePlugin.ts
    dependencies: [ecs-plugin, hud]
    ux:
      discovery: "Score increments on every clear; larger clears produce larger jumps"
      feedback: "Score digit animation on HUD after each clear; score tally at level end"
      onboarding: "Score is self-explanatory"
    notes: |
      GDD does not specify a scoring formula; one must be designed per CoS scoring constraints.
      Must be multiplicative not additive: at minimum groupSize × cascadeMultiplier.
      Proposed shape (plan phase to confirm):
        groupScore = (groupSize - 1) × 100
        cascadeMultiplier = cascadeDepth + 1
        comboBonus = comboActivated ? 500 : 0
        moveEfficiency = baseMoves / actualMoves (applied at level end)
        levelScore += (groupScore × cascadeMultiplier + comboBonus) per clear
      Wide range required: skilled player 3× beginner on same level.
      open question: exact formula values are design decisions; plan phase must specify.

conflicts: []

risk_areas:
  - feature: ecs-plugin
    reason: "Central integration point — all game state flows through this. Blocking dependency for board-renderer, tap-input-handler, animation-event-queue, and all renderers."
  - feature: animation-event-queue
    reason: "Cross-cutting — connects ECS transactions, board renderer, input gate, and all animated sequences. Incorrect event ordering will break board physics feel."
  - feature: game-screen-shell-theme
    reason: "Switches gameMode from 'dom' to 'pixi'. Touches GameController — every downstream feature depends on this transition working correctly."
  - feature: hud
    reason: "Adds new UI element to viewport. Viewport budget must be computed before board-renderer sizes cells. Must not overlap board or logo."
  - feature: tap-input-handler
    reason: "Pixi event model wiring. touch-action:none, pointer capture, and input-gate must all be correct or game is unplayable. Also wires combo activation direction input (swipe on Rocket Alien)."

open_questions:
  - id: q-scoring-formula
    question: "What are the exact scoring formula coefficients? GDD says score accumulates but gives no formula."
    context: "CoS scoring requires multiplicative dimensions. Plan phase must define group bonus scale, cascade multiplier, combo bonuses, and move efficiency factor."
  - id: q-chapter-boundary
    question: "What constitutes a chapter? How many levels per chapter?"
    context: "GDD shows Chapter Complete Screen at 'chapter goal met' but never defines chapter size. Level generation profiles (1–10, 11–30, 31+) could map to chapters but this is unconfirmed."
  - id: q-continue-backend
    question: "Continue system: should the core-pass implementation use a stub (grant moves directly) or wire ad/currency scaffolding?"
    context: "GDD says 'ad or in-game currency for extra moves' but neither ads nor currency backend is in the scaffold. Core pass scope needs clarification."
  - id: q-rocket-alien-direction
    question: "Rocket Alien direction: GDD says 'direction chosen by player via swipe at moment of use'. How does this interact with the single-tap interaction archetype?"
    context: "The primary interaction is Tap. Rocket Alien requires a swipe to select row vs column. This is a second gesture type. Plan must define whether this is a modal tap-then-swipe or a swipe-only activation."
