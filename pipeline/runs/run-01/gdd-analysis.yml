    notes: |
      States: Idle (input open), Animating (input blocked), Won, Lost, Paused.
      Win condition: alienCellCount==0 AND boardState==Idle → Won.
      Lose condition: movesRemaining==0 AND alienCellCount>0 AND boardState==Idle → Lost.
      No state change is instant — minimum 80 ms animation duration.
      boardState is an ECS resource. bridgeEcsToSignals propagates to DOM screens.

