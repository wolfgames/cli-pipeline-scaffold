    dom_reserved_top_px: 0      # prime.carry_forward.reserved_top_px
    total_px: 635               # 60 + 8 + 495 + 8 + 64
    available_px: 844
    spare_px: 209
    board_fraction: 0.587       # 495/844 — just below 60% nominal; acceptable given spare
    touch_target_min_px: 44     # MIN_TOUCH_TARGET from viewport.ts line 36
    touch_target_check: "PASS"  # cell 55×55 px > 44 min
    tile_cap_check: "PASS"      # cell 55 px < 64 cap
