      line: 36
    - file: "src/core/config/viewport.ts"
      symbol: "calculateMaxGridSize reservedBottom default"
      value: 100
      line: 57
      note: "scaffold default; game overrides to 64 px (logo only, no controls)"
    - file: "pipeline/runs/run-01/phase-summary.yml"
